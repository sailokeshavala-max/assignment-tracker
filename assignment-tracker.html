<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assignment Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #141417;
      --card: #1a1a1f;
      --border: #2a2a32;
      --border-light: #333340;
      --text: #f0f0f5;
      --muted: #6b6b80;
      --accent: #c8ff57;
      --accent-dim: rgba(200,255,87,0.12);
      --red: #ff5c5c;
      --orange: #ff9f40;
      --blue: #5c9fff;
      --green: #57ff9f;
      --purple: #b57fff;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-head);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 60% 40% at 80% 10%, rgba(200,255,87,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 10% 80%, rgba(92,159,255,0.05) 0%, transparent 60%);
    }

    /* HEADER */
    header {
      padding: 2.5rem 3rem 1.5rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .logo-area h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
    }
    .logo-area h1 span { color: var(--accent); }
    .logo-area p {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.25rem;
      letter-spacing: 0.08em;
    }
    .stats-bar {
      display: flex;
      gap: 2rem;
      font-family: var(--font-mono);
    }
    .stat { text-align: right; }
    .stat-num {
      font-size: 1.5rem;
      font-weight: 500;
      color: var(--accent);
      line-height: 1;
    }
    .stat-label {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 0.2rem;
    }

    /* MAIN LAYOUT */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 3rem 4rem;
    }

    /* FILTER & ADD */
    .toolbar {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .filter-group {
      display: flex;
      gap: 0.4rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.25rem;
    }
    .filter-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      padding: 0.4rem 0.9rem;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.18s ease;
      text-transform: uppercase;
    }
    .filter-btn:hover { color: var(--text); background: var(--border); }
    .filter-btn.active { background: var(--accent); color: #0d0d0f; font-weight: 600; }

    .sort-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      outline: none;
      text-transform: uppercase;
    }
    .sort-select:focus { border-color: var(--accent); color: var(--text); }

    .add-btn {
      margin-left: auto;
      background: var(--accent);
      color: #0d0d0f;
      border: none;
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 0.85rem;
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.18s ease;
      letter-spacing: -0.01em;
    }
    .add-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(200,255,87,0.25); }
    .add-btn:active { transform: translateY(0); }

    /* FORM PANEL */
    .form-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.8rem;
      margin-bottom: 2rem;
      display: none;
      animation: slideDown 0.25s ease;
    }
    .form-panel.open { display: block; }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .form-panel h2 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 1.2rem;
      color: var(--accent);
      font-family: var(--font-mono);
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .form-full { grid-column: 1 / -1; }
    .form-group label {
      display: block;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      padding: 0.65rem 0.9rem;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.18s;
      resize: none;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--accent); }
    .form-group select option { background: var(--card); }

    .priority-picker {
      display: flex;
      gap: 0.5rem;
    }
    .priority-opt {
      flex: 1;
      padding: 0.6rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      cursor: pointer;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      transition: all 0.18s;
      user-select: none;
    }
    .priority-opt:hover { border-color: var(--border-light); color: var(--text); }
    .priority-opt.sel-low { border-color: var(--blue); background: rgba(92,159,255,0.12); color: var(--blue); }
    .priority-opt.sel-medium { border-color: var(--orange); background: rgba(255,159,64,0.12); color: var(--orange); }
    .priority-opt.sel-high { border-color: var(--red); background: rgba(255,92,92,0.12); color: var(--red); }
    .priority-opt.sel-urgent {
      border-color: var(--purple);
      background: rgba(181,127,255,0.12);
      color: var(--purple);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(181,127,255,0.3); }
      50% { box-shadow: 0 0 0 5px rgba(181,127,255,0); }
    }

    .form-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      margin-top: 1.2rem;
      padding-top: 1.2rem;
      border-top: 1px solid var(--border);
    }
    .btn-cancel {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-head);
      font-size: 0.85rem;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.18s;
    }
    .btn-cancel:hover { border-color: var(--border-light); color: var(--text); }
    .btn-save {
      background: var(--accent);
      color: #0d0d0f;
      border: none;
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 0.85rem;
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.18s;
    }
    .btn-save:hover { box-shadow: 0 4px 16px rgba(200,255,87,0.3); }

    /* ASSIGNMENT LIST */
    .section-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .assignments-list {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.1rem 1.4rem;
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      align-items: center;
      gap: 1rem;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 12px 0 0 12px;
    }
    .card.priority-low::before { background: var(--blue); }
    .card.priority-medium::before { background: var(--orange); }
    .card.priority-high::before { background: var(--red); }
    .card.priority-urgent::before { background: var(--purple); }

    .card:hover {
      border-color: var(--border-light);
      transform: translateX(2px);
    }
    .card.done {
      opacity: 0.45;
    }
    .card.done .card-title { text-decoration: line-through; color: var(--muted); }

    .card-check {
      width: 20px; height: 20px;
      border: 2px solid var(--border-light);
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.18s;
    }
    .card-check:hover { border-color: var(--accent); }
    .card.done .card-check {
      background: var(--accent);
      border-color: var(--accent);
    }
    .card-check svg { display: none; }
    .card.done .card-check svg { display: block; }

    .card-body { min-width: 0; }
    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 0.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-meta {
      display: flex;
      gap: 0.8rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .meta-item {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.3rem;
      letter-spacing: 0.04em;
    }
    .meta-item svg { width: 11px; height: 11px; }

    .badge {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
      font-weight: 500;
    }
    .badge-low { background: rgba(92,159,255,0.15); color: var(--blue); }
    .badge-medium { background: rgba(255,159,64,0.15); color: var(--orange); }
    .badge-high { background: rgba(255,92,92,0.15); color: var(--red); }
    .badge-urgent { background: rgba(181,127,255,0.15); color: var(--purple); }

    .badge-subject {
      background: var(--accent-dim);
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
    }

    .due-indicator {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.04em;
    }
    .due-overdue { color: var(--red); }
    .due-today { color: var(--orange); }
    .due-soon { color: var(--orange); }
    .due-ok { color: var(--muted); }

    .card-actions {
      display: flex;
      gap: 0.4rem;
      opacity: 0;
      transition: opacity 0.18s;
    }
    .card:hover .card-actions { opacity: 1; }
    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 30px; height: 30px;
      border-radius: 6px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s;
    }
    .icon-btn:hover { border-color: var(--border-light); color: var(--text); }
    .icon-btn.del:hover { border-color: var(--red); color: var(--red); }
    .icon-btn svg { width: 13px; height: 13px; }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }
    .empty-state .big { font-size: 2.5rem; margin-bottom: 1rem; }
    .empty-state p { font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 0.06em; }

    /* OVERDUE SECTION */
    .overdue-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(255,92,92,0.1);
      border: 1px solid rgba(255,92,92,0.25);
      color: var(--red);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      margin-left: 0.75rem;
    }

    @media (max-width: 700px) {
      header { padding: 1.5rem; flex-direction: column; align-items: flex-start; gap: 1rem; }
      .container { padding: 1.5rem; }
      .form-grid { grid-template-columns: 1fr; }
      .form-full { grid-column: auto; }
      .card { grid-template-columns: auto 1fr; }
      .card-actions { opacity: 1; grid-column: 1 / -1; justify-content: flex-end; }
      .due-indicator { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-area">
    <h1>Task<span>Board</span></h1>
    <p>Assignment Tracker — Student Edition</p>
  </div>
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-pending">0</div>
      <div class="stat-label">Pending</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-done">0</div>
      <div class="stat-label">Done</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-overdue" style="color: var(--red)">0</div>
      <div class="stat-label">Overdue</div>
    </div>
  </div>
</header>

<div class="container">

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="filter-group">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="pending">Pending</button>
      <button class="filter-btn" data-filter="done">Done</button>
      <button class="filter-btn" data-filter="overdue">Overdue</button>
    </div>
    <select class="sort-select" id="sort-select">
      <option value="due">Sort: Due Date</option>
      <option value="priority">Sort: Priority</option>
      <option value="created">Sort: Created</option>
      <option value="subject">Sort: Subject</option>
    </select>
    <button class="add-btn" id="toggle-form">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Add Assignment
    </button>
  </div>

  <!-- FORM -->
  <div class="form-panel" id="form-panel">
    <h2>// New Assignment</h2>
    <div class="form-grid">
      <div class="form-group form-full">
        <label>Assignment Title</label>
        <input type="text" id="f-title" placeholder="e.g. Research Paper on Climate Change" />
      </div>
      <div class="form-group">
        <label>Subject</label>
        <input type="text" id="f-subject" placeholder="e.g. Biology" />
      </div>
      <div class="form-group">
        <label>Due Date</label>
        <input type="date" id="f-due" />
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="f-type">
          <option value="Essay">Essay</option>
          <option value="Project">Project</option>
          <option value="Quiz">Quiz</option>
          <option value="Exam">Exam</option>
          <option value="Lab Report">Lab Report</option>
          <option value="Presentation">Presentation</option>
          <option value="Homework">Homework</option>
          <option value="Reading">Reading</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group form-full">
        <label>Priority</label>
        <div class="priority-picker">
          <div class="priority-opt" data-p="low">🔵 Low</div>
          <div class="priority-opt" data-p="medium">🟠 Medium</div>
          <div class="priority-opt" data-p="high">🔴 High</div>
          <div class="priority-opt" data-p="urgent">⚡ Urgent</div>
        </div>
      </div>
      <div class="form-group form-full">
        <label>Notes (optional)</label>
        <textarea id="f-notes" rows="2" placeholder="Any extra info, reminders, or links..."></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" id="cancel-form">Cancel</button>
      <button class="btn-save" id="save-form">Save Assignment</button>
    </div>
  </div>

  <!-- LIST -->
  <div class="section-label" id="list-label">All Assignments</div>
  <div class="assignments-list" id="list"></div>
  <div class="empty-state" id="empty-state" style="display:none">
    <div class="big">📋</div>
    <p>No assignments here yet.</p>
  </div>

</div>

<script>
  // ── DATA ─────────────────────────────────────────────────────────────
  const STORAGE_KEY = 'taskboard_v1';
  let assignments = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  let editingId = null;
  let currentFilter = 'all';
  let selectedPriority = 'medium';

  const priorityOrder = { urgent: 0, high: 1, medium: 2, low: 3 };

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(assignments));
  }

  function today() {
    return new Date().toISOString().split('T')[0];
  }

  function daysUntil(dateStr) {
    const due = new Date(dateStr + 'T23:59:59');
    const now = new Date();
    return Math.ceil((due - now) / (1000 * 60 * 60 * 24));
  }

  function dueLabel(dateStr) {
    if (!dateStr) return '';
    const d = daysUntil(dateStr);
    if (d < 0) return { text: `${Math.abs(d)}d overdue`, cls: 'due-overdue' };
    if (d === 0) return { text: 'Due Today!', cls: 'due-today' };
    if (d === 1) return { text: 'Due Tomorrow', cls: 'due-soon' };
    if (d <= 3) return { text: `${d} days left`, cls: 'due-soon' };
    return { text: formatDate(dateStr), cls: 'due-ok' };
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const [y, m, d] = dateStr.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[parseInt(m)-1]} ${parseInt(d)}, ${y}`;
  }

  function isOverdue(a) {
    return !a.done && a.dueDate && daysUntil(a.dueDate) < 0;
  }

  // ── STATS ─────────────────────────────────────────────────────────────
  function updateStats() {
    const total = assignments.length;
    const done = assignments.filter(a => a.done).length;
    const pending = total - done;
    const overdue = assignments.filter(isOverdue).length;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-done').textContent = done;
    document.getElementById('stat-pending').textContent = pending;
    document.getElementById('stat-overdue').textContent = overdue;
  }

  // ── FILTER & SORT ─────────────────────────────────────────────────────
  function getFiltered() {
    let list = [...assignments];
    if (currentFilter === 'pending') list = list.filter(a => !a.done);
    if (currentFilter === 'done') list = list.filter(a => a.done);
    if (currentFilter === 'overdue') list = list.filter(isOverdue);

    const sort = document.getElementById('sort-select').value;
    list.sort((a, b) => {
      if (sort === 'priority') return (priorityOrder[a.priority] ?? 2) - (priorityOrder[b.priority] ?? 2);
      if (sort === 'due') {
        if (!a.dueDate && !b.dueDate) return 0;
        if (!a.dueDate) return 1;
        if (!b.dueDate) return -1;
        return a.dueDate.localeCompare(b.dueDate);
      }
      if (sort === 'subject') return (a.subject || '').localeCompare(b.subject || '');
      return b.createdAt - a.createdAt;
    });
    return list;
  }

  // ── RENDER ─────────────────────────────────────────────────────────────
  function render() {
    updateStats();
    const list = getFiltered();
    const container = document.getElementById('list');
    const empty = document.getElementById('empty-state');

    const labels = { all: 'All Assignments', pending: 'Pending Assignments', done: 'Completed', overdue: '⚠ Overdue' };
    document.getElementById('list-label').textContent = labels[currentFilter];

    if (list.length === 0) {
      container.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    container.innerHTML = list.map(a => {
      const due = a.dueDate ? dueLabel(a.dueDate) : null;
      const overdue = isOverdue(a);
      return `
      <div class="card priority-${a.priority} ${a.done ? 'done' : ''}" data-id="${a.id}">
        <div class="card-check" onclick="toggleDone('${a.id}')">
          <svg viewBox="0 0 12 10" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 5l3.5 3.5L11 1" stroke="#0d0d0f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="card-body">
          <div class="card-title">${escHtml(a.title)}</div>
          <div class="card-meta">
            ${a.subject ? `<span class="badge-subject">${escHtml(a.subject)}</span>` : ''}
            <span class="badge badge-${a.priority}">${a.priority}</span>
            ${a.type ? `<span class="meta-item">
              <svg viewBox="0 0 12 12" fill="none"><rect x="1" y="1" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.2"/><path d="M3.5 4h5M3.5 6h5M3.5 8h3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
              ${escHtml(a.type)}</span>` : ''}
            ${a.dueDate ? `<span class="meta-item ${due.cls}">
              <svg viewBox="0 0 12 12" fill="none"><rect x="1" y="2" width="10" height="9" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M4 1v2M8 1v2M1 5h10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
              ${due.text}</span>` : ''}
          </div>
          ${a.notes ? `<div class="meta-item" style="margin-top:0.35rem; color: var(--muted); font-family: var(--font-mono); font-size:0.65rem; max-width: 500px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${escHtml(a.notes)}</div>` : ''}
        </div>
        <div style="font-family:var(--font-mono); font-size:0.65rem; color:var(--muted); white-space:nowrap; text-align:right;">
          ${a.dueDate ? formatDate(a.dueDate) : '—'}
        </div>
        <div class="card-actions">
          <button class="icon-btn" onclick="editCard('${a.id}')" title="Edit">
            <svg viewBox="0 0 14 14" fill="none"><path d="M10 2L12 4L5 11H3V9L10 2Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
          </button>
          <button class="icon-btn del" onclick="deleteCard('${a.id}')" title="Delete">
            <svg viewBox="0 0 14 14" fill="none"><path d="M2 4h10M5 4V2.5a.5.5 0 01.5-.5h3a.5.5 0 01.5.5V4M6 7v3M8 7v3M3 4l.7 7.3A.7.7 0 004.4 12h5.2a.7.7 0 00.7-.7L11 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>`;
    }).join('');
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── ACTIONS ────────────────────────────────────────────────────────────
  function toggleDone(id) {
    const a = assignments.find(x => x.id === id);
    if (a) { a.done = !a.done; save(); render(); }
  }

  function deleteCard(id) {
    assignments = assignments.filter(x => x.id !== id);
    save(); render();
  }

  function editCard(id) {
    const a = assignments.find(x => x.id === id);
    if (!a) return;
    editingId = id;
    document.getElementById('f-title').value = a.title;
    document.getElementById('f-subject').value = a.subject || '';
    document.getElementById('f-due').value = a.dueDate || '';
    document.getElementById('f-type').value = a.type || 'Homework';
    document.getElementById('f-notes').value = a.notes || '';
    selectedPriority = a.priority;
    updatePriorityUI();
    openForm();
  }

  // ── FORM ──────────────────────────────────────────────────────────────
  function openForm() {
    document.getElementById('form-panel').classList.add('open');
    document.getElementById('toggle-form').innerHTML = `
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Close`;
  }

  function closeForm() {
    document.getElementById('form-panel').classList.remove('open');
    document.getElementById('toggle-form').innerHTML = `
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Add Assignment`;
    editingId = null;
    document.getElementById('f-title').value = '';
    document.getElementById('f-subject').value = '';
    document.getElementById('f-due').value = '';
    document.getElementById('f-notes').value = '';
    selectedPriority = 'medium';
    updatePriorityUI();
  }

  function updatePriorityUI() {
    document.querySelectorAll('.priority-opt').forEach(el => {
      el.className = 'priority-opt';
      if (el.dataset.p === selectedPriority) el.classList.add(`sel-${selectedPriority}`);
    });
  }

  document.getElementById('toggle-form').addEventListener('click', () => {
    const open = document.getElementById('form-panel').classList.contains('open');
    open ? closeForm() : openForm();
  });

  document.getElementById('cancel-form').addEventListener('click', closeForm);

  document.querySelectorAll('.priority-opt').forEach(el => {
    el.addEventListener('click', () => {
      selectedPriority = el.dataset.p;
      updatePriorityUI();
    });
  });

  document.getElementById('save-form').addEventListener('click', () => {
    const title = document.getElementById('f-title').value.trim();
    if (!title) { document.getElementById('f-title').focus(); return; }

    const data = {
      title,
      subject: document.getElementById('f-subject').value.trim(),
      dueDate: document.getElementById('f-due').value,
      type: document.getElementById('f-type').value,
      notes: document.getElementById('f-notes').value.trim(),
      priority: selectedPriority,
    };

    if (editingId) {
      const idx = assignments.findIndex(x => x.id === editingId);
      if (idx !== -1) assignments[idx] = { ...assignments[idx], ...data };
    } else {
      assignments.unshift({ id: Date.now().toString(), done: false, createdAt: Date.now(), ...data });
    }

    save(); closeForm(); render();
  });

  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      render();
    });
  });

  document.getElementById('sort-select').addEventListener('change', render);

  // ── SEED DATA ─────────────────────────────────────────────────────────
  if (assignments.length === 0) {
    const t = new Date();
    const fmt = (offset) => {
      const d = new Date(t); d.setDate(d.getDate() + offset);
      return d.toISOString().split('T')[0];
    };
    assignments = [
      { id: '1', title: 'Research Paper: Climate Change Effects', subject: 'Biology', type: 'Essay', dueDate: fmt(2), priority: 'urgent', notes: 'Min 3000 words, 5 sources required', done: false, createdAt: Date.now() - 5000 },
      { id: '2', title: 'Chapter 7 Problem Set', subject: 'Math', type: 'Homework', dueDate: fmt(1), priority: 'high', notes: '', done: false, createdAt: Date.now() - 4000 },
      { id: '3', title: 'French Revolution Group Presentation', subject: 'History', type: 'Presentation', dueDate: fmt(5), priority: 'medium', notes: 'Assigned with Jake & Priya', done: false, createdAt: Date.now() - 3000 },
      { id: '4', title: 'Lab Report: Titration Experiment', subject: 'Chemistry', type: 'Lab Report', dueDate: fmt(7), priority: 'medium', notes: '', done: false, createdAt: Date.now() - 2000 },
      { id: '5', title: 'Midterm Exam Study Guide', subject: 'Physics', type: 'Exam', dueDate: fmt(-1), priority: 'high', notes: 'Cover chapters 1-8', done: false, createdAt: Date.now() - 1000 },
      { id: '6', title: 'Poetry Analysis: T.S. Eliot', subject: 'English', type: 'Essay', dueDate: fmt(14), priority: 'low', notes: '', done: true, createdAt: Date.now() },
    ];
    save();
  }

  // ── INIT ──────────────────────────────────────────────────────────────
  updatePriorityUI();
  render();
</script>
</body>
</html>
